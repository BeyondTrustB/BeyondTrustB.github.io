<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>BeyondTrust Bank - Crypto Portfolio</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #002f6c;
            --secondary-blue: #005eb8;
            --accent-green: #00a859;
            --accent-red: #d32f2f;
            --accent-orange: #ff9800;
            --crypto-purple: #6b2fb5;
            --crypto-dark: #1a1a2e;
            --text-dark: #2d3436;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: #0a0a1a;
            color: white;
            min-height: 100vh;
            padding: 1rem;
            position: relative;
            overflow-x: hidden;
            width: 100%;
        }

        #pageLoader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #6b2fb5, #1a1a2e);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 1;
            transition: opacity 0.3s ease;
            flex-direction: column;
            gap: 1rem;
        }

        .crypto-loader {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top: 4px solid #f7931a;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .crypto-loader-text {
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .dashboard-container {
            opacity: 0;
            transition: opacity 0.3s ease;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        /* Header */
        .crypto-header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 2rem 2rem;
            border-radius: 20px;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
        }

        .crypto-header::before {
            content: "₿";
            position: absolute;
            right: -20px;
            top: -20px;
            font-size: 150px;
            opacity: 0.05;
            font-weight: bold;
        }

        .back-button {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 1rem;
            transition: background 0.3s;
            text-decoration: none;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .crypto-title {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .crypto-title i {
            font-size: 2.5rem;
            color: #f7931a;
        }

        .crypto-title h1 {
            font-size: 2rem;
        }

        .crypto-subtitle {
            opacity: 0.7;
        }

        /* Balance Card */
        .balance-card {
            background: linear-gradient(135deg, #6b2fb5, #9b59b6);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        .balance-label {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 0.5rem;
        }

        .balance-amount {
            font-size: 2.5rem;
            font-weight: 700;
        }

        /* Action Buttons - ABOVE Live Chart */
        .actions-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .crypto-action-btn {
            background: linear-gradient(135deg, #6b2fb5, #9b59b6);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 15px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            transition: transform 0.2s;
        }

        .crypto-action-btn:hover {
            transform: translateY(-2px);
        }

        /* Live Prices Section */
        .prices-section {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .section-title {
            font-size: 1.3rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .prices-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .price-card {
            background: #0f0f23;
            border-radius: 15px;
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: transform 0.2s;
        }

        .price-card:hover {
            transform: translateY(-3px);
        }

        .price-info {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .price-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .price-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .price-details h4 {
            font-size: 1rem;
        }

        .price-details p {
            font-size: 0.8rem;
            opacity: 0.7;
        }

        .price-value {
            text-align: right;
        }

        .price-amount {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .price-change {
            font-size: 0.7rem;
        }

        .positive { color: #00a859; }
        .negative { color: #d32f2f; }

        /* Transactions Section */
        .transactions-section {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 1.5rem;
        }

        .transactions-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .crypto-transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: #0f0f23;
            border-radius: 12px;
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .crypto-transaction-item:hover {
            background: #1a1a3e;
        }

        .tx-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .tx-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #6b2fb520;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .tx-icon img {
            width: 60%;
            height: 60%;
            object-fit: contain;
        }

        .tx-details h4 {
            font-size: 0.9rem;
        }

        .tx-details p {
            font-size: 0.7rem;
            opacity: 0.6;
        }

        .tx-amount {
            text-align: right;
        }

        .tx-amount .amount {
            font-weight: 700;
            font-size: 1rem;
        }

        .tx-amount .status {
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 10px;
            display: inline-block;
            margin-top: 4px;
        }

        .status-completed { background: #00a85920; color: #00a859; }
        .status-pending { background: #ff980020; color: #ff9800; }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1001;
        }

        .modal-content {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .close-modal {
            font-size: 1.8rem;
            cursor: pointer;
            background: none;
            border: none;
            color: white;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .form-group select, .form-group input {
            width: 100%;
            padding: 0.8rem;
            border-radius: 10px;
            border: 1px solid #333;
            background: #0f0f23;
            color: white;
            font-size: 1rem;
        }

        .crypto-option {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .crypto-option img {
            width: 24px;
            height: 24px;
            object-fit: contain;
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #6b2fb5, #9b59b6);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .pin-input {
            text-align: center;
            font-size: 1.5rem;
            letter-spacing: 5px;
        }

        @media (max-width: 768px) {
            .actions-row { grid-template-columns: 1fr; }
            .prices-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <div id="pageLoader">
        <div class="crypto-loader"></div>
        <div class="crypto-loader-text">₿ Loading Crypto Portfolio...</div>
    </div>

    <div class="dashboard-container" id="dashboardContainer">
        <div class="crypto-header">
            <button class="back-button" onclick="window.location.href='../index.html'">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </button>
            <div class="crypto-title">
                <i class="fab fa-bitcoin"></i>
                <h1>Crypto Portfolio</h1>
            </div>
            <div class="crypto-subtitle">Manage your digital assets securely</div>
        </div>

        <!-- Balance Card -->
        <div class="balance-card">
            <div class="balance-label">Total Crypto Balance (USDC)</div>
            <div class="balance-amount" id="cryptoBalance">0.00 USDC</div>
        </div>

        <!-- Action Buttons - ABOVE Live Chart -->
        <div class="actions-row">
            <button class="crypto-action-btn" onclick="openTransferModal()">
                <i class="fas fa-paper-plane"></i> Send Crypto
            </button>
            <button class="crypto-action-btn" onclick="openBuyModal()">
                <i class="fas fa-shopping-cart"></i> Buy Crypto
            </button>
        </div>

        <!-- Live Prices Section -->
        <div class="prices-section">
            <div class="section-title">
                <i class="fas fa-chart-line"></i> Live Market Prices
                <span style="font-size: 0.7rem; opacity: 0.6;" id="lastUpdate"></span>
            </div>
            <div class="prices-grid" id="pricesGrid">
                <!-- Bitcoin -->
                <div class="price-card">
                    <div class="price-info">
                        <div class="price-icon"><img src="images/btc.png" alt="BTC" onerror="this.src='images/default-crypto.png'"></div>
                        <div class="price-details">
                            <h4>Bitcoin</h4>
                            <p>BTC</p>
                        </div>
                    </div>
                    <div class="price-value">
                        <div class="price-amount" id="btcPrice">$0</div>
                        <div class="price-change" id="btcChange"></div>
                    </div>
                </div>
                <!-- Ethereum -->
                <div class="price-card">
                    <div class="price-info">
                        <div class="price-icon"><img src="images/eth.png" alt="ETH" onerror="this.src='images/default-crypto.png'"></div>
                        <div class="price-details">
                            <h4>Ethereum</h4>
                            <p>ETH</p>
                        </div>
                    </div>
                    <div class="price-value">
                        <div class="price-amount" id="ethPrice">$0</div>
                        <div class="price-change" id="ethChange"></div>
                    </div>
                </div>
                <!-- XRP -->
                <div class="price-card">
                    <div class="price-info">
                        <div class="price-icon"><img src="images/xrp.png" alt="XRP" onerror="this.src='images/default-crypto.png'"></div>
                        <div class="price-details">
                            <h4>XRP</h4>
                            <p>XRP</p>
                        </div>
                    </div>
                    <div class="price-value">
                        <div class="price-amount" id="xrpPrice">$0</div>
                        <div class="price-change" id="xrpChange"></div>
                    </div>
                </div>
                <!-- Solana -->
                <div class="price-card">
                    <div class="price-info">
                        <div class="price-icon"><img src="images/solana.png" alt="SOL" onerror="this.src='images/default-crypto.png'"></div>
                        <div class="price-details">
                            <h4>Solana</h4>
                            <p>SOL</p>
                        </div>
                    </div>
                    <div class="price-value">
                        <div class="price-amount" id="solPrice">$0</div>
                        <div class="price-change" id="solChange"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Transaction History -->
        <div class="transactions-section">
            <div class="section-title">
                <i class="fas fa-history"></i> Crypto Transaction History
            </div>
            <div class="transactions-list" id="cryptoTransactions">
                <!-- Transactions will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Transfer Modal -->
    <div id="transferModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-paper-plane"></i> Send Crypto</h3>
                <button class="close-modal" onclick="closeModal('transferModal')">&times;</button>
            </div>
            <div id="transferForm">
                <div class="form-group">
                    <label>Select Cryptocurrency</label>
                    <select id="cryptoSelect" onchange="updateNetworkOptions()">
                        <option value="">-- Select Coin --</option>
                        <option value="bitcoin">Bitcoin (BTC)</option>
                        <option value="ethereum">Ethereum (ETH)</option>
                        <option value="usdc">USDC (USD Coin)</option>
                        <option value="solana"> Solana (SOL)</option>
                    </select>
                </div>
                <div class="form-group" id="networkGroup" style="display: none;">
                    <label>Select Network</label>
                    <select id="networkSelect">
                        <option value="">-- Select Network --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Crypto Address</label>
                    <input type="text" id="cryptoAddress" placeholder="Enter wallet address">
                </div>
                <div class="form-group">
                    <label>Amount (USDC)</label>
                    <input type="number" id="cryptoAmount" placeholder="Enter amount">
                </div>
                <button class="submit-btn" onclick="requestTransferPin()">Continue to PIN</button>
            </div>
            <div id="pinForm" style="display: none;">
                <div class="form-group">
                    <label>Enter Transfer PIN</label>
                    <input type="password" id="transferPinInput" class="pin-input" maxlength="4" placeholder="****">
                </div>
                <button class="submit-btn" onclick="processCryptoTransfer()">Confirm Transfer</button>
                <button class="submit-btn" style="background: #333; margin-top: 0.5rem;" onclick="cancelPin()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Buy Modal -->
    <div id="buyModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-shopping-cart"></i> Buy Crypto</h3>
                <button class="close-modal" onclick="closeModal('buyModal')">&times;</button>
            </div>
            <div class="form-group">
                <label>Select Cryptocurrency to Buy</label>
                <select id="buyCryptoSelect">
                    <option value="">-- Select Coin --</option>
                    <option value="usdc"> USDC (USD Coin)</option>
                    <option value="bitcoin">Bitcoin (BTC) - Coming Soon</option>
                    <option value="ethereum"> Ethereum (ETH) - Coming Soon</option>
                    <option value="solana"> Solana (SOL) - Coming Soon</option>
                </select>
            </div>
            <div class="form-group">
                <label>Amount (USD)</label>
                <input type="number" id="buyAmount" placeholder="Enter amount in USD">
            </div>
            <div class="form-group">
                <label>You will receive</label>
                <input type="text" id="receiveAmount" readonly placeholder="0.00" style="background: #0f0f23;">
            </div>
            <button class="submit-btn" onclick="requestBuyPin()">Continue to PIN</button>
            <div id="buyPinForm" style="display: none; margin-top: 1rem;">
                <div class="form-group">
                    <label>Enter Transfer PIN</label>
                    <input type="password" id="buyPinInput" class="pin-input" maxlength="4" placeholder="****">
                </div>
                <button class="submit-btn" onclick="processCryptoBuy()">Confirm Purchase</button>
            </div>
        </div>
    </div>

    <script>
        // ========== STORAGE KEYS ==========
        const STORAGE_USDC_BALANCE = 'usdc_balance';
        const STORAGE_CRYPTO_TRANSACTIONS = 'crypto_transactions';
        const STORAGE_BALANCE = 'checking_balance';
        const CORRECT_PIN = "1111";

        // Default crypto transactions
        const DEFAULT_CRYPTO_TRANSACTIONS = [
            {
                id: 'CRYPTO-001',
                type: 'receive',
                coin: 'USDC',
                amount: 12500,
                address: '0x8fB9...d3E2a',
                status: 'completed',
                date: '27 Apr 2026',
                time: '11:30 AM',
                network: 'ERC20'
            }
        ];

        // Prices cache
        let cryptoPrices = {
            bitcoin: 0,
            ethereum: 0,
            xrp: 0,
            solana: 0
        };

        // Load USDC balance
        function loadUSDCBalance() {
            let balance = parseFloat(localStorage.getItem(STORAGE_USDC_BALANCE));
            if (isNaN(balance)) {
                balance = 12500;
                localStorage.setItem(STORAGE_USDC_BALANCE, balance);
            }
            return balance;
        }

        // Save USDC balance
        function saveUSDCBalance(balance) {
            localStorage.setItem(STORAGE_USDC_BALANCE, balance);
        }

        // Load crypto transactions
        function loadCryptoTransactions() {
            let transactions = JSON.parse(localStorage.getItem(STORAGE_CRYPTO_TRANSACTIONS));
            if (!transactions || transactions.length === 0) {
                transactions = [...DEFAULT_CRYPTO_TRANSACTIONS];
                localStorage.setItem(STORAGE_CRYPTO_TRANSACTIONS, JSON.stringify(transactions));
            }
            return transactions;
        }

        // Save crypto transaction
        function saveCryptoTransaction(transaction) {
            let transactions = loadCryptoTransactions();
            transactions.unshift(transaction);
            localStorage.setItem(STORAGE_CRYPTO_TRANSACTIONS, JSON.stringify(transactions));
        }

        // Update display
        function updateDisplay() {
            const usdcBalance = loadUSDCBalance();
            document.getElementById('cryptoBalance').textContent = `${usdcBalance.toLocaleString('en-US', { minimumFractionDigits: 2 })} USDC`;
            displayTransactions();
        }

        // Display transactions
        function displayTransactions() {
            const container = document.getElementById('cryptoTransactions');
            const transactions = loadCryptoTransactions();
            
            container.innerHTML = transactions.map(tx => `
                <div class="crypto-transaction-item">
                    <div class="tx-info">
                        <div class="tx-icon">
                            <img src="images/${tx.coin === 'USDC' ? 'usdc' : tx.coin.toLowerCase()}.png" alt="${tx.coin}" onerror="this.src='images/default-crypto.png'">
                        </div>
                        <div class="tx-details">
                            <h4>${tx.type === 'receive' ? 'Received' : 'Sent'} ${tx.coin}</h4>
                            <p>${tx.date} • ${tx.time} • ${tx.network || 'N/A'}</p>
                        </div>
                    </div>
                    <div class="tx-amount">
                        <div class="amount ${tx.type === 'receive' ? 'credit' : 'debit'}">
                            ${tx.type === 'receive' ? '+' : '-'} ${Math.abs(tx.amount).toLocaleString()} ${tx.coin}
                        </div>
                        <div class="status status-${tx.status}">${tx.status}</div>
                    </div>
                </div>
            `).join('');
        }

        // ========== LIVE PRICES API ==========
        async function fetchCryptoPrices() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,ripple,solana&vs_currencies=usd&include_24hr_change=true');
                const data = await response.json();
                
                cryptoPrices.bitcoin = data.bitcoin?.usd || 0;
                cryptoPrices.ethereum = data.ethereum?.usd || 0;
                cryptoPrices.xrp = data.ripple?.usd || 0;
                cryptoPrices.solana = data.solana?.usd || 0;
                
                const btcChange = data.bitcoin?.usd_24h_change || 0;
                const ethChange = data.ethereum?.usd_24h_change || 0;
                const xrpChange = data.ripple?.usd_24h_change || 0;
                const solChange = data.solana?.usd_24h_change || 0;
                
                document.getElementById('btcPrice').textContent = `$${cryptoPrices.bitcoin.toLocaleString()}`;
                document.getElementById('ethPrice').textContent = `$${cryptoPrices.ethereum.toLocaleString()}`;
                document.getElementById('xrpPrice').textContent = `$${cryptoPrices.xrp.toLocaleString()}`;
                document.getElementById('solPrice').textContent = `$${cryptoPrices.solana.toLocaleString()}`;
                
                document.getElementById('btcChange').innerHTML = `<span class="${btcChange >= 0 ? 'positive' : 'negative'}">${btcChange >= 0 ? '+' : ''}${btcChange.toFixed(2)}%</span>`;
                document.getElementById('ethChange').innerHTML = `<span class="${ethChange >= 0 ? 'positive' : 'negative'}">${ethChange >= 0 ? '+' : ''}${ethChange.toFixed(2)}%</span>`;
                document.getElementById('xrpChange').innerHTML = `<span class="${xrpChange >= 0 ? 'positive' : 'negative'}">${xrpChange >= 0 ? '+' : ''}${xrpChange.toFixed(2)}%</span>`;
                document.getElementById('solChange').innerHTML = `<span class="${solChange >= 0 ? 'positive' : 'negative'}">${solChange >= 0 ? '+' : ''}${solChange.toFixed(2)}%</span>`;
                
                document.getElementById('lastUpdate').textContent = `Updated: ${new Date().toLocaleTimeString()}`;
            } catch (error) {
                console.error('Error fetching prices:', error);
                document.getElementById('btcPrice').textContent = '$63,245';
                document.getElementById('ethPrice').textContent = '$3,245';
                document.getElementById('xrpPrice').textContent = '$0.52';
                document.getElementById('solPrice').textContent = '$145';
            }
        }

        // ========== TRANSFER FUNCTIONS ==========
        let selectedCryptoForTransfer = '';
        let transferAmount = 0;
        let transferAddress = '';
        let selectedNetwork = '';

        function updateNetworkOptions() {
            const crypto = document.getElementById('cryptoSelect').value;
            const networkGroup = document.getElementById('networkGroup');
            const networkSelect = document.getElementById('networkSelect');
            
            if (crypto === 'usdc') {
                networkGroup.style.display = 'block';
                networkSelect.innerHTML = `
                    <option value="">-- Select Network --</option>
                    <option value="ERC20">Ethereum (ERC20)</option>
                    <option value="TRC20">Tron (TRC20)</option>
                `;
            } else if (crypto === 'ethereum') {
                networkGroup.style.display = 'block';
                networkSelect.innerHTML = `
                    <option value="">-- Select Network --</option>
                    <option value="ERC20">Ethereum (ERC20)</option>
                `;
            } else if (crypto === 'bitcoin') {
                networkGroup.style.display = 'block';
                networkSelect.innerHTML = `
                    <option value="">-- Select Network --</option>
                    <option value="BTC">Bitcoin Network</option>
                `;
            } else if (crypto === 'solana') {
                networkGroup.style.display = 'block';
                networkSelect.innerHTML = `
                    <option value="">-- Select Network --</option>
                    <option value="SOL">Solana Network</option>
                `;
            } else {
                networkGroup.style.display = 'none';
            }
        }

        function openTransferModal() {
            document.getElementById('transferModal').style.display = 'flex';
            document.getElementById('transferForm').style.display = 'block';
            document.getElementById('pinForm').style.display = 'none';
            document.getElementById('cryptoSelect').value = '';
            document.getElementById('cryptoAddress').value = '';
            document.getElementById('cryptoAmount').value = '';
            document.getElementById('networkGroup').style.display = 'none';
        }

        function requestTransferPin() {
            const crypto = document.getElementById('cryptoSelect').value;
            const address = document.getElementById('cryptoAddress').value;
            const amount = parseFloat(document.getElementById('cryptoAmount').value);
            const network = document.getElementById('networkSelect')?.value || '';
            
            if (!crypto) {
                alert('Please select a cryptocurrency');
                return;
            }
            if (crypto === 'usdc' && !network) {
                alert('Please select a network');
                return;
            }
            if (!address) {
                alert('Please enter a wallet address');
                return;
            }
            if (!amount || amount <= 0) {
                alert('Please enter a valid amount');
                return;
            }
            
            const usdcBalance = loadUSDCBalance();
            if (amount > usdcBalance) {
                alert(`Insufficient USDC balance. Available: ${usdcBalance.toLocaleString()} USDC`);
                return;
            }
            
            selectedCryptoForTransfer = crypto;
            transferAmount = amount;
            transferAddress = address;
            selectedNetwork = network;
            
            document.getElementById('transferForm').style.display = 'none';
            document.getElementById('pinForm').style.display = 'block';
            document.getElementById('transferPinInput').value = '';
        }

        function cancelPin() {
            document.getElementById('transferForm').style.display = 'block';
            document.getElementById('pinForm').style.display = 'none';
            selectedCryptoForTransfer = '';
            transferAmount = 0;
            transferAddress = '';
        }

        function processCryptoTransfer() {
            const pin = document.getElementById('transferPinInput').value;
            
            if (pin !== CORRECT_PIN) {
                alert('Invalid PIN. Transfer cancelled.');
                cancelPin();
                return;
            }
            
            let usdcBalance = loadUSDCBalance();
            usdcBalance -= transferAmount;
            saveUSDCBalance(usdcBalance);
            
            const now = new Date();
            const transaction = {
                id: 'CRYPTO-' + Date.now(),
                type: 'send',
                coin: selectedCryptoForTransfer.toUpperCase(),
                amount: transferAmount,
                address: transferAddress.substring(0, 10) + '...',
                network: selectedNetwork,
                status: 'pending',
                date: now.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }),
                time: now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })
            };
            
            saveCryptoTransaction(transaction);
            
            alert(`Transfer of ${transferAmount.toLocaleString()} ${selectedCryptoForTransfer.toUpperCase()} initiated!\n\nStatus: Pending - Awaiting blockchain confirmation.\nReference: ${transaction.id}`);
            
            closeModal('transferModal');
            updateDisplay();
        }

        // ========== BUY FUNCTIONS ==========
        function openBuyModal() {
            document.getElementById('buyModal').style.display = 'flex';
            document.getElementById('buyCryptoSelect').value = '';
            document.getElementById('buyAmount').value = '';
            document.getElementById('receiveAmount').value = '';
            document.getElementById('buyPinForm').style.display = 'none';
        }

        document.getElementById('buyCryptoSelect')?.addEventListener('change', function() {
            const selected = this.value;
            const amount = parseFloat(document.getElementById('buyAmount').value);
            
            if (selected === 'usdc' && amount > 0) {
                document.getElementById('receiveAmount').value = amount.toFixed(2) + ' USDC';
            } else if (selected !== 'usdc' && selected !== '') {
                document.getElementById('receiveAmount').value = 'Only USDC is available for purchase';
            } else {
                document.getElementById('receiveAmount').value = '';
            }
        });

        document.getElementById('buyAmount')?.addEventListener('input', function() {
            const selected = document.getElementById('buyCryptoSelect').value;
            const amount = parseFloat(this.value);
            
            if (selected === 'usdc' && amount > 0) {
                document.getElementById('receiveAmount').value = amount.toFixed(2) + ' USDC';
            } else if (selected !== 'usdc' && selected !== '') {
                document.getElementById('receiveAmount').value = 'Only USDC is available for purchase';
            }
        });

        function requestBuyPin() {
            const selected = document.getElementById('buyCryptoSelect').value;
            const amount = parseFloat(document.getElementById('buyAmount').value);
            
            if (!selected) {
                alert('Please select a cryptocurrency');
                return;
            }
            if (selected !== 'usdc') {
                alert('You can only purchase USDC at this time. Other cryptocurrencies will be available soon.');
                return;
            }
            if (!amount || amount <= 0) {
                alert('Please enter a valid amount');
                return;
            }
            
            let usdBalance = parseFloat(localStorage.getItem(STORAGE_BALANCE)) || 6314066;
            if (amount > usdBalance) {
                alert(`Insufficient USD balance. Available: $${usdBalance.toLocaleString()}`);
                return;
            }
            
            window.buyAmountUSD = amount;
            document.getElementById('buyPinForm').style.display = 'block';
        }

        function processCryptoBuy() {
            const pin = document.getElementById('buyPinInput').value;
            
            if (pin !== CORRECT_PIN) {
                alert('Invalid PIN. Purchase cancelled.');
                document.getElementById('buyPinForm').style.display = 'none';
                return;
            }
            
            let usdBalance = parseFloat(localStorage.getItem(STORAGE_BALANCE)) || 6314066;
            usdBalance -= window.buyAmountUSD;
            localStorage.setItem(STORAGE_BALANCE, usdBalance);
            
            let usdcBalance = loadUSDCBalance();
            usdcBalance += window.buyAmountUSD;
            saveUSDCBalance(usdcBalance);
            
            const now = new Date();
            const transaction = {
                id: 'BUY-' + Date.now(),
                type: 'receive',
                coin: 'USDC',
                amount: window.buyAmountUSD,
                address: 'Exchange Purchase',
                network: 'USD → USDC',
                status: 'completed',
                date: now.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }),
                time: now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })
            };
            
            saveCryptoTransaction(transaction);
            
            alert(`Successfully purchased ${window.buyAmountUSD.toLocaleString()} USDC!\n\nNew USDC Balance: ${usdcBalance.toLocaleString()} USDC`);
            
            closeModal('buyModal');
            updateDisplay();
        }

        // ========== MODAL FUNCTIONS ==========
        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        // ========== INITIALIZATION ==========
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('pageLoader').style.opacity = '0';
                document.getElementById('dashboardContainer').style.opacity = '1';
                setTimeout(() => {
                    document.getElementById('pageLoader').style.display = 'none';
                }, 300);
            }, 2000);
            
            updateDisplay();
            fetchCryptoPrices();
            setInterval(fetchCryptoPrices, 30000);
        });
        
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        }
    </script>
</body>
</html>
